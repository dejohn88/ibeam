events {
    worker_connections 1024;
}
http {
    server {
        listen 8080;
        location / {
            proxy_pass <https://127.0.0.1:5000>;
            proxy_ssl_verify off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }
    }
}
